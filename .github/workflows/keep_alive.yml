name: Keep-Alive PFE API

on:
  schedule:
    - cron: '*/5 * * * *' # Pinger - Try every 5 minutes (GitHub Action limit)
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Hugging Face Space
        run: |
          curl -s https://hamzakharmouch-potatoblight.hf.space/api/health
          echo "Pinged successfully at $(date)"
